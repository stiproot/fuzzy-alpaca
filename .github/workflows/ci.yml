name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run openapi
      - uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: apps/gateway/openapi.json

  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run mypy src
      - run: uv run pytest

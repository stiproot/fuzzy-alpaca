# fuzzy-alpaca local system stack — gateway (sidecar-less) + orchestrator (+ daprd) + Postgres.
# The orchestrator calls the gateway over plain HTTP; only the orchestrator joins the Dapr mesh.
services:
  postgres:
    container_name: fa-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: alpaca
      POSTGRES_PASSWORD: alpaca
      POSTGRES_DB: alpaca
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpaca"]
      interval: 3s
      timeout: 3s
      retries: 20

  placement:
    container_name: fa-placement
    image: daprio/placement:edge
    command: ["./placement", "--port=50006"]

  scheduler:
    container_name: fa-scheduler
    image: daprio/scheduler:edge
    command: ["./scheduler", "--port=50007", "--etcd-data-dir=/data"]
    # Host bind-mount with open perms — the scheduler mkdirs under /data as a
    # non-root user (matches h's dapr-etcd approach).
    volumes:
      - ./dapr-etcd:/data

  gateway:
    container_name: fa-gateway
    build:
      context: ./apps/gateway
    env_file:
      - ./apps/gateway/.env # APCA paper keys
    environment:
      PORT: "3000"
      SERVICE_API_KEY: "${SERVICE_API_KEY:-dev-service-key}"
      ALPACA_LIVE: "false"
    ports:
      - "3001:3000"

  orchestrator:
    container_name: fa-orchestrator
    build:
      context: ./apps/orchestrator
    environment:
      APP_PORT: "8080"
      GATEWAY_URL: "http://gateway:3000"
      SERVICE_API_KEY: "${SERVICE_API_KEY:-dev-service-key}"
      DAPR_HTTP_PORT: "3500"
      DATABASE_URL: "postgresql://alpaca:alpaca@postgres:5432/alpaca"
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_started

  trading-mcp:
    container_name: fa-trading-mcp
    build:
      context: ./apps/orchestrator
    command: ["uv", "run", "--no-dev", "python", "-m", "orchestrator.presentation.mcp_server"]
    environment:
      MCP_PORT: "8090"
      GATEWAY_URL: "http://gateway:3000"
      SERVICE_API_KEY: "${SERVICE_API_KEY:-dev-service-key}"
      DATABASE_URL: "postgresql://alpaca:alpaca@postgres:5432/alpaca"
    ports:
      - "8090:8090"
    depends_on:
      gateway:
        condition: service_started
      postgres:
        condition: service_healthy

  research-agent:
    container_name: fa-research-agent
    build:
      context: ./apps/orchestrator
    command: ["uv", "run", "--no-dev", "python", "-m", "orchestrator.presentation.agent_app"]
    environment:
      APP_PORT: "8080"
      SERVICE_API_KEY: "${SERVICE_API_KEY:-dev-service-key}"
      MCP_URL: "http://trading-mcp:8090/sse"
      DATABASE_URL: "postgresql://alpaca:alpaca@postgres:5432/alpaca"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.deepseek.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-deepseek-chat}"
      RESEARCH_SYMBOLS: "${RESEARCH_SYMBOLS:-BTC/USD,ETH/USD}"
    depends_on:
      postgres:
        condition: service_healthy
      trading-mcp:
        condition: service_started

  research-agent-dapr:
    container_name: fa-research-agent-dapr
    image: daprio/daprd:edge
    command:
      - "./daprd"
      - "--app-id=research-agent"
      - "--app-port=8080"
      - "--dapr-http-port=3500"
      - "--placement-host-address=placement:50006"
      - "--scheduler-host-address=scheduler:50007"
      - "--resources-path=/components"
      - "--config=/components/appconfig.yaml"
      - "--log-level=info"
    volumes:
      - ./dapr:/components
    network_mode: "service:research-agent"
    depends_on:
      - research-agent
      - placement
      - scheduler

  orchestrator-dapr:
    container_name: fa-orchestrator-dapr
    image: daprio/daprd:edge
    command:
      - "./daprd"
      - "--app-id=orchestrator"
      - "--app-port=8080"
      - "--dapr-http-port=3500"
      - "--placement-host-address=placement:50006"
      - "--scheduler-host-address=scheduler:50007"
      - "--resources-path=/components"
      - "--config=/components/appconfig.yaml"
      - "--log-level=info"
    volumes:
      - ./dapr:/components
    network_mode: "service:orchestrator"
    depends_on:
      - orchestrator
      - placement
      - scheduler

volumes:
  postgres-data:

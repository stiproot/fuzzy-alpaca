apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.postgresql
  version: v1
  metadata:
    - name: connectionString
      value: "host=postgres user=alpaca password=alpaca dbname=alpaca port=5432 sslmode=disable"
    # Required for the Dapr Workflow engine (workflow/actor state lives here).
    - name: actorStateStore
      value: "true"
